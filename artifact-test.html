<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifact Skill · GitHub Pages 测试</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">@custom-variant dark (&:where(.dark, .dark *));
    @theme { --color-accent: #6366f1; --radius-card: 0.875rem; }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>html{color-scheme:light dark}body{font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",Roboto,sans-serif}.tabular{font-variant-numeric:tabular-nums}</style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen antialiased">

  <header class="sticky top-0 z-20 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur">
    <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2"><span class="inline-flex h-7 w-7 items-center justify-center rounded-lg bg-[var(--color-accent)] text-white text-sm" id="emoji">🚀</span><span id="title" class="font-semibold">Artifact Skill Test</span><span id="version" class="text-xs text-slate-400"></span></div>
      <button id="themeToggle" aria-label="Toggle dark mode" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900"><i data-lucide="sun" class="h-4 w-4 hidden dark:block"></i><i data-lucide="moon" class="h-4 w-4 dark:hidden"></i></button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <section class="mb-8">
      <span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-100 dark:bg-emerald-500/15 text-emerald-700 dark:text-emerald-300 px-3 py-1 text-xs font-medium mb-4"><i data-lucide="check-circle" class="h-3.5 w-3.5"></i> Published via GitHub Pages</span>
      <h1 class="text-3xl font-bold tracking-tight">🚀 Artifact Skill · GitHub Pages 连接测试</h1>
      <p class="mt-3 text-slate-600 dark:text-slate-300">此页面由 <code class="text-xs bg-slate-100 dark:bg-slate-800 rounded px-1.5 py-0.5">artifact</code> skill 生成，通过 GitHub Pages 公开发布。</p>
    </section>

    <section class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8" id="kpis"></section>

    <section class="rounded-[var(--radius-card)] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm p-6 mb-6">
      <h2 class="flex items-center gap-2 text-lg font-bold mb-3"><i data-lucide="test-tube" class="h-5 w-5 text-[var(--color-accent)]"></i>验证项目</h2>
      <div class="space-y-2" id="checks"></div>
    </section>

    <section class="rounded-[var(--radius-card)] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm p-6">
      <h2 class="flex items-center gap-2 text-lg font-bold mb-3"><i data-lucide="link" class="h-5 w-5 text-[var(--color-accent)]"></i>链接信息</h2>
      <div class="space-y-2 text-sm" id="links"></div>
    </section>

    <footer class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-800 text-xs text-slate-400" id="footer"></footer>
  </main>

  <script>
    const ARTIFACT_META = { title:"Artifact Skill Test", emoji:"🚀", version:1, createdAt:"2026-06-29T00:00:00", updatedAt:"2026-06-29T00:00:00" };
    const ARTIFACT_DATA = {
      generatedAt: "2026-06-29",
      kpis:[
        { label:"Skill 名称", value:"artifact" },
        { label:"原型模板", value:"7" },
        { label:"模式轴", value:"3" },
        { label:"测试用例", value:"27" }
      ],
      checks:[
        { label:"GitHub Pages 部署", pass: true, detail:"legacy build, 纯 HTML 零构建" },
        { label:"HTTPS 强制", pass: true, detail:"Let's Encrypt 自动证书" },
        { label:"深色/浅色切换", pass: true, detail:"class-based dark mode, localStorage 持久化" },
        { label:"CDN 资源加载", pass: true, detail:"Tailwind v4 + Lucide icons" },
        { label:"数据嵌入", pass: true, detail:"ARTIFACT_META + ARTIFACT_DATA 独立块" },
        { label:"响应式布局", pass: true, detail:"Tailwind responsive grid" }
      ],
      links:[
        { label:"仓库", value:"github.com/kaikai2823/artifact-pages" },
        { label:"Skill 源码", value:"github.com/kaikai2823/kai-skills/tree/master/artifact" },
        { label:"本地路径", value:"C:\\Users\\18404\\ZCodeProject\\artifact-test.html" }
      ]
    };

    function safeStore(k,v){try{if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v)}catch{return null}}
    (function(){try{if(safeStore("artifact-theme")==="light")document.documentElement.classList.remove("dark")}catch{}})();
    document.getElementById("themeToggle").addEventListener("click",()=>{
      const d=document.documentElement.classList.toggle("dark"); safeStore("artifact-theme",d?"dark":"light");
    });
    document.getElementById("title").textContent=ARTIFACT_META.title;
    document.getElementById("emoji").textContent=ARTIFACT_META.emoji;
    document.getElementById("version").textContent="v"+ARTIFACT_META.version;

    document.getElementById("kpis").innerHTML=ARTIFACT_DATA.kpis.map(k=>
      `<div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-3 shadow-sm"><p class="text-2xl font-bold tabular text-[var(--color-accent)]">${k.value}</p><p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">${k.label}</p></div>`).join("");

    document.getElementById("checks").innerHTML=ARTIFACT_DATA.checks.map(c=>
      `<div class="flex items-center gap-3 rounded-lg bg-slate-50 dark:bg-slate-800/50 px-3 py-2"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full ${c.pass?"bg-emerald-100 dark:bg-emerald-500/15 text-emerald-600 dark:text-emerald-400":"bg-rose-100 dark:bg-rose-500/15 text-rose-600 dark:text-rose-400"}"><i data-lucide="${c.pass?"check":"x"}" class="h-3.5 w-3.5"></i></span><span class="text-sm">${c.label}</span><span class="ml-auto text-xs text-slate-400">${c.detail}</span></div>`).join("");

    document.getElementById("links").innerHTML=ARTIFACT_DATA.links.map(l=>
      `<div class="flex items-center justify-between"><span class="text-slate-500 dark:text-slate-400">${l.label}</span><code class="text-xs bg-slate-100 dark:bg-slate-800 rounded px-2 py-0.5">${l.value}</code></div>`).join("");

    document.getElementById("footer").textContent="由 artifact skill 生成 · "+new Date(ARTIFACT_META.updatedAt).toLocaleDateString()+" · 发布于 kaikai2823.github.io/artifact-pages";

    if(window.lucide)lucide.createIcons();
  </script>
</body>
</html>
